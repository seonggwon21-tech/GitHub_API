name: GitHub API QA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          GITHUB_TOKEN: ${{ secrets.GH_API_TOKEN }}
          GITHUB_USERNAME: seonggwon21-tech
        run: pytest tests/ --no-header -q

      # The suite is identical across versions, so publish results from one
      # version only — keeps the Allure report a single, un-duplicated run.
      - name: Upload allure results
        if: always() && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/

  report:
    name: Publish Allure Report
    needs: test
    runs-on: ubuntu-latest
    # Publish even when tests fail — that's exactly when the report matters most.
    if: always() && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results/

      - name: Install allure CLI
        run: npm install -g allure-commandline --save-dev

      - name: Load previous report history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy history for trend graph
        continue-on-error: true
        run: cp -r gh-pages/history allure-results/history

      - name: Generate allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
